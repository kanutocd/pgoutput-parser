name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - "4.0"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake
      - name: Validate RBS signatures
        run: bundle exec rake rbs:validate
      - name: Run benchmark smoke test
        run: |
          PGOUTPUT_BENCH_ITERATIONS=10 \
          PGOUTPUT_BENCH_WARMUP=1 \
          PGOUTPUT_BENCH_RACTORS=2 \
          PGOUTPUT_BENCH_SCENARIOS=tracker_mixed,ractor_tracker \
          PGOUTPUT_BENCH_RELATION_CACHE=all \
          bundle exec ruby benchmark/parser_throughput.rb
